version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowpilot123}
      POSTGRES_DB: ${POSTGRES_DB:-flowpilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowpilot} -d ${POSTGRES_DB:-flowpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flowpilot

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-flowpilot123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-flowpilot123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flowpilot

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "${DATABASE_URL:-postgresql://flowpilot:flowpilot123@postgres:5432/flowpilot?schema=public}"
      REDIS_URL: "${REDIS_URL:-redis://:flowpilot123@redis:6379}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change_me_nextauth_secret}"
      DEFAULT_ORGANIZATION_ID: "${DEFAULT_ORGANIZATION_ID:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN:-flowpilot_verify_token}"
      WHATSAPP_APP_SECRET: "${WHATSAPP_APP_SECRET:-}"
      N8N_EVENT_WEBHOOK_URL: "${N8N_EVENT_WEBHOOK_URL:-http://n8n:5678/webhook/flowpilot-event}"
      N8N_SHARED_SECRET: "${N8N_SHARED_SECRET:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_GROWTH: "${STRIPE_PRICE_GROWTH:-}"
      STRIPE_PRICE_AGENCY: "${STRIPE_PRICE_AGENCY:-}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flowpilot

  worker:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "${DATABASE_URL:-postgresql://flowpilot:flowpilot123@postgres:5432/flowpilot?schema=public}"
      REDIS_URL: "${REDIS_URL:-redis://:flowpilot123@redis:6379}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker
    networks:
      - flowpilot

  campaign-worker:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "${DATABASE_URL:-postgresql://flowpilot:flowpilot123@postgres:5432/flowpilot?schema=public}"
      REDIS_URL: "${REDIS_URL:-redis://:flowpilot123@redis:6379}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker:campaigns
    networks:
      - flowpilot

  automation-worker:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "${DATABASE_URL:-postgresql://flowpilot:flowpilot123@postgres:5432/flowpilot?schema=public}"
      REDIS_URL: "${REDIS_URL:-redis://:flowpilot123@redis:6379}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker:automations
    networks:
      - flowpilot

  email-worker:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "${DATABASE_URL:-postgresql://flowpilot:flowpilot123@postgres:5432/flowpilot?schema=public}"
      REDIS_URL: "${REDIS_URL:-redis://:flowpilot123@redis:6379}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-FlowPilot <hello@yourdomain.com>}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker:emails
    networks:
      - flowpilot

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change_me_n8n_encryption_key}
      N8N_SECURE_COOKIE: "${N8N_SECURE_COOKIE:-false}"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-flowpilot}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-flowpilot}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-flowpilot123}
      DB_POSTGRESDB_SCHEMA: public
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      FLOWPILOT_PUBLIC_API_URL: ${FLOWPILOT_PUBLIC_API_URL:-http://web:3000}
      N8N_SHARED_SECRET: ${N8N_SHARED_SECRET:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${N8N_PORT_HOST:-5678}:5678"
    networks:
      - flowpilot

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  flowpilot:
    driver: bridge